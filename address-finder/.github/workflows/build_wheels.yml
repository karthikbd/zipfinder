name: Build & Release Wheels

on:
  push:
    tags: ["v*"]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    container: quay.io/pypa/manylinux2014_x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          /opt/python/cp311-cp311/bin/pip install \
            setuptools wheel zstandard numpy auditwheel

      - name: Compile libpostal + download data
        run: bash scripts/build_libpostal.sh

      - name: Quantize model weights
        run: |
          /opt/python/cp311-cp311/bin/python scripts/quantize_model.py \
            --src /tmp/postal_raw --dst address_finder/_data_raw

      - name: Compress bundle
        run: /opt/python/cp311-cp311/bin/python scripts/compress_bundle.py

      - name: Build + repair wheel
        run: bash scripts/auditwheel_repair.sh

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel-linux-x86_64
          path: dist/repaired/*.whl

  publish:
    needs: build-linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { path: dist/ }
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: \${{ secrets.PYPI_API_TOKEN }}
